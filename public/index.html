<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiftPay - Fast & Secure Payments</title>
    <script src="https://js.stripe.com/v3/"></script>
    <script src="https://www.paypal.com/sdk/js?client-id=YOUR_PAYPAL_CLIENT_ID&currency=USD"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
            color: #ffffff;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 40px 0;
            border-bottom: 2px solid #FFD700;
        }

        .logo {
            font-size: 48px;
            font-weight: bold;
            background: linear-gradient(45deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tagline {
            color: #FFD700;
            margin-top: 10px;
            font-size: 18px;
        }

        .auth-container {
            max-width: 400px;
            margin: 50px auto;
            background: rgba(255, 215, 0, 0.1);
            padding: 40px;
            border-radius: 15px;
            border: 2px solid #FFD700;
        }

        .dashboard {
            display: none;
        }

        .card {
            background: rgba(255, 215, 0, 0.1);
            border: 2px solid #FFD700;
            border-radius: 15px;
            padding: 30px;
            margin: 20px 0;
        }

        .balance-card {
            text-align: center;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(255, 165, 0, 0.2));
        }

        .balance-amount {
            font-size: 48px;
            font-weight: bold;
            color: #FFD700;
            margin: 20px 0;
        }

        .input-group {
            margin: 20px 0;
        }

        label {
            display: block;
            color: #FFD700;
            margin-bottom: 8px;
            font-weight: 600;
        }

        input, select {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #FFD700;
            border-radius: 8px;
            color: #ffffff;
            font-size: 16px;
        }

        input:focus {
            outline: none;
            border-color: #FFA500;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #FFD700, #FFA500);
            border: none;
            border-radius: 8px;
            color: #000000;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: rgba(255, 215, 0, 0.2);
            color: #FFD700;
            border: 2px solid #FFD700;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 215, 0, 0.3);
        }

        th {
            background: rgba(255, 215, 0, 0.2);
            color: #FFD700;
            font-weight: bold;
        }

        .status-completed {
            color: #00ff00;
        }

        .status-pending {
            color: #FFA500;
        }

        .type-send {
            color: #ff6b6b;
        }

        .type-receive {
            color: #00ff00;
        }

        .type-deposit {
            color: #FFD700;
        }

        .error {
            background: rgba(255, 0, 0, 0.2);
            border: 2px solid #ff0000;
            color: #ff6b6b;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
        }

        .success {
            background: rgba(0, 255, 0, 0.2);
            border: 2px solid #00ff00;
            color: #00ff00;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }

        .tab {
            padding: 12px 24px;
            background: rgba(255, 215, 0, 0.1);
            border: 2px solid #FFD700;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab.active {
            background: linear-gradient(45deg, #FFD700, #FFA500);
            color: #000000;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .logout-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(255, 0, 0, 0.3);
            border: 2px solid #ff0000;
            color: #ff6b6b;
            border-radius: 8px;
            cursor: pointer;
        }

        #paypal-button-container {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">⚡ SwiftPay</div>
            <div class="tagline">Lightning-Fast Payments, Powered by Trust</div>
        </div>

        <!-- Auth Section -->
        <div id="auth-section" class="auth-container">
            <h2 style="color: #FFD700; text-align: center; margin-bottom: 30px;">Welcome to SwiftPay</h2>
            
            <div class="tabs">
                <div class="tab active" onclick="switchAuthTab('login')">Login</div>
                <div class="tab" onclick="switchAuthTab('register')">Register</div>
            </div>

            <div id="login-form" class="tab-content active">
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="login-email" placeholder="your@email.com">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="login-password" placeholder="••••••••">
                </div>
                <button class="btn" onclick="login()">Login</button>
            </div>

            <div id="register-form" class="tab-content">
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="register-email" placeholder="your@email.com">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="register-password" placeholder="••••••••">
                </div>
                <div class="input-group">
                    <label>Confirm Password</label>
                    <input type="password" id="register-confirm" placeholder="••••••••">
                </div>
                <button class="btn" onclick="register()">Create Account</button>
            </div>

            <div id="auth-message"></div>
        </div>

        <!-- Dashboard Section -->
        <div id="dashboard-section" class="dashboard">
            <button class="logout-btn" onclick="logout()">Logout</button>

            <!-- Balance Card -->
            <div class="card balance-card">
                <h2>Your Balance</h2>
                <div class="balance-amount" id="balance">$0.00</div>
                <p style="color: #FFD700;">KYC Status: <span id="kyc-status">Pending</span></p>
            </div>

            <!-- Action Cards -->
            <div class="grid">
                <!-- Send Money -->
                <div class="card">
                    <h3 style="color: #FFD700; margin-bottom: 20px;">💸 Send Money</h3>
                    <div class="input-group">
                        <label>Recipient Email</label>
                        <input type="email" id="send-email" placeholder="recipient@email.com">
                    </div>
                    <div class="input-group">
                        <label>Amount ($)</label>
                        <input type="number" id="send-amount" placeholder="0.00" step="0.01">
                    </div>
                    <div class="input-group">
                        <label>Description</label>
                        <input type="text" id="send-description" placeholder="What's this for?">
                    </div>
                    <button class="btn" onclick="sendMoney()">Send Money</button>
                </div>

                <!-- Add Money -->
                <div class="card">
                    <h3 style="color: #FFD700; margin-bottom: 20px;">💳 Add Money</h3>
                    <div class="input-group">
                        <label>Amount ($)</label>
                        <input type="number" id="add-amount" placeholder="0.00" step="0.01">
                    </div>
                    <div class="input-group">
                        <label>Payment Method</label>
                        <select id="payment-method">
                            <option value="stripe">Credit/Debit Card (Stripe)</option>
                            <option value="paypal">PayPal</option>
                        </select>
                    </div>
                    <button class="btn" onclick="addMoney()">Add Money</button>
                    <div id="paypal-button-container"></div>
                </div>
            </div>

            <!-- Transactions -->
            <div class="card">
                <h3 style="color: #FFD700; margin-bottom: 20px;">📊 Transaction History</h3>
                <table id="transactions-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Type</th>
                            <th>Amount</th>
                            <th>Status</th>
                            <th>Details</th>
                        </tr>
                    </thead>
                    <tbody id="transactions-body">
                        <tr>
                            <td colspan="5" style="text-align: center; color: #FFD700;">No transactions yet</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div id="dashboard-message"></div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;
        let token = localStorage.getItem('token');
        let stripe = Stripe('pk_test_YOUR_STRIPE_PUBLISHABLE_KEY');

        // Check if user is logged in
        if (token) {
            showDashboard();
        }

        function switchAuthTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('login-form').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('register-form').classList.add('active');
            }
        }

        async function register() {
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;
            const confirm = document.getElementById('register-confirm').value;

            if (password !== confirm) {
                showMessage('auth-message', 'Passwords do not match', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    token = data.token;
                    localStorage.setItem('token', token);
                    showDashboard();
                } else {
                    showMessage('auth-message', data.error, 'error');
                }
            } catch (error) {
                showMessage('auth-message', 'Registration failed', 'error');
            }
        }

        async function login() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            try {
                const response = await fetch(`${API_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    token = data.token;
                    localStorage.setItem('token', token);
                    showDashboard();
                } else {
                    showMessage('auth-message', data.error, 'error');
                }
            } catch (error) {
                showMessage('auth-message', 'Login failed', 'error');
            }
        }

        function logout() {
            localStorage.removeItem('token');
            token = null;
            document.getElementById('auth-section').style.display = 'block';
            document.getElementById('dashboard-section').style.display = 'none';
        }

        async function showDashboard() {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('dashboard-section').style.display = 'block';
            
            await loadProfile();
            await loadTransactions();
        }

        async function loadProfile() {
            try {
                const response = await fetch(`${API_URL}/api/user/profile`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const data = await response.json();
                document.getElementById('balance').textContent = `$${parseFloat(data.balance).toFixed(2)}`;
                document.getElementById('kyc-status').textContent = data.kyc_status;
            } catch (error) {
                console.error('Failed to load profile');
            }
        }

        async function loadTransactions() {
            try {
                const response = await fetch(`${API_URL}/api/transactions`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const transactions = await response.json();
                const tbody = document.getElementById('transactions-body');
                
                if (transactions.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: #FFD700;">No transactions yet</td></tr>';
                    return;
                }

                tbody.innerHTML = transactions.map(t => `
                    <tr>
                        <td>${new Date(t.created_at).toLocaleDateString()}</td>
                        <td class="type-${t.type}">${t.type.toUpperCase()}</td>
                        <td>$${parseFloat(t.amount).toFixed(2)}</td>
                        <td class="status-${t.status}">${t.status.toUpperCase()}</td>
                        <td>${t.description || t.recipient_email || '-'}</td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('Failed to load transactions');
            }
        }

        async function sendMoney() {
            const recipientEmail = document.getElementById('send-email').value;
            const amount = parseFloat(document.getElementById('send-amount').value);
            const description = document.getElementById('send-description').value;

            try {
                const response = await fetch(`${API_URL}/api/payments/send`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ recipientEmail, amount, description })
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage('dashboard-message', 'Money sent successfully!', 'success');
                    document.getElementById('send-email').value = '';
                    document.getElementById('send-amount').value = '';
                    document.getElementById('send-description').value = '';
                    await loadProfile();
                    await loadTransactions();
                } else {
                    showMessage('dashboard-message', data.error, 'error');
                }
            } catch (error) {
                showMessage('dashboard-message', 'Failed to send money', 'error');
            }
        }

        async function addMoney() {
            const amount = parseFloat(document.getElementById('add-amount').value);
            const method = document.getElementById('payment-method').value;

            if (method === 'stripe') {
                await addMoneyStripe(amount);
            } else {
                await addMoneyPayPal(amount);
            }
        }

        async function addMoneyStripe(amount) {
            try {
                const response = await fetch(`${API_URL}/api/payments/stripe/create-intent`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ amount })
                });

                const { clientSecret } = await response.json();

                const { error } = await stripe.confirmCardPayment(clientSecret, {
                    payment_method: {
                        card: { token: 'tok_visa' } // Demo token
                    }
                });

                if (error) {
                    showMessage('dashboard-message', error.message, 'error');
                } else {
                    showMessage('dashboard-message', 'Money added successfully!', 'success');
                    await loadProfile();
                    await loadTransactions();
                }
            } catch (error) {
                showMessage('dashboard-message', 'Failed to add money', 'error');
            }
        }

        async function addMoneyPayPal(amount) {
            try {
                const response = await fetch(`${API_URL}/api/payments/paypal/create-order`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ amount })
                });

                const { orderId } = await response.json();
                
                // PayPal button integration would go here
                showMessage('dashboard-message', 'PayPal integration ready', 'success');
            } catch (error) {
                showMessage('dashboard-message', 'Failed to create PayPal order', 'error');
            }
        }

        function showMessage(elementId, message, type) {
            const element = document.getElementById(elementId);
            element.className = type;
            element.textContent = message;
            setTimeout(() => element.textContent = '', 5000);
        }
    </script>
</body>
</html>
